        function renderNews(filter = 'all', search = '') {
            const grid = document.getElementById('newsGrid');
            let filtered = news;
            
            if (filter !== 'all') {
                filtered = filtered.filter(item => item.category === filter);
            }
            
            if (search) {
                const searchLower = search.toLowerCase();
                filtered = filtered.filter(item => 
                    item.title.toLowerCase().includes(searchLower) ||
                    item.description.toLowerCase().includes(searchLower)
                );
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results">No se encontraron noticias con esos criterios.</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(item => `
                <div class="card">
                    <div class="card-header">
                        <span class="card-category cat-${item.category}">${getCategoryName(item.category)}</span>
                        <span class="card-date">${item.date}</span>
                    </div>
                    <h3>${item.title}</h3>
                    <p>${item.description}</p>
                    <div class="card-footer">
                        <span class="source"><a href="${item.url}" target="_blank">${item.source}</a></span>
                    </div>
                </div>
            `).join('');
            
            updateStats(filtered, filter);
        }
        
        function getCategoryName(cat) {
            const names = {
                models: '🤖 Modelos',
                tools: '🆕 Herramientas',
                news: '📰 News',
                products: '💡 Productos',
                funding: '💰 Funding',
                papers: '🔧 Papers',
                regulation: '⚖️ Regulación'
            };
            return names[cat] || cat;
        }
        
        function updateStats(filtered, filter) {
            document.getElementById('totalCount').textContent = filtered.length;
            document.getElementById('modelCount').textContent = news.filter(n => n.category === 'models').length;
            document.getElementById('toolCount').textContent = news.filter(n => n.category === 'tools' || n.category === 'products').length;
            document.getElementById('fundingCount').textContent = news.filter(n => n.category === 'funding').length;
        }
        
        function renderSources() {
            const list = document.getElementById('sourcesList');
            list.innerHTML = sources.map(s => 
                `<a href="${s.url}" target="_blank">${s.name}</a>`
            ).join('');
        }
        
        // Event Listeners
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
            renderNews(activeFilter, e.target.value);
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderNews(btn.dataset.filter, document.getElementById('searchInput').value);
            });
        });
        
        // Initialize
        renderNews();
        renderSources();
    </script>
